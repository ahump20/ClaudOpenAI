name = "universal-skills-indexer"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["0 */6 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "universal-skills"
database_id = "REPLACE_WITH_wrangler_d1_create_OUTPUT"

[[r2_buckets]]
binding = "CONTENT"
bucket_name = "universal-skills-content"

[[kv_namespaces]]
binding = "INDEXER_STATE"
id = "REPLACE_WITH_wrangler_kv_create_INDEXER_STATE_ID"

[observability]
enabled = true

# Required secret: GITHUB_TOKEN (set via: wrangler secret put GITHUB_TOKEN)
